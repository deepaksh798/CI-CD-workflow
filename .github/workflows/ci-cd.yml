name: CI/CD Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Start Containers
        run: docker-compose up -d --build

      - name: Cheak Running Containers
        run: docker ps

      - name: Stop Containers
        run: docker-compose down